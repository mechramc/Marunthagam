# Triage LoRA on relabeled data (post-spotcheck triage GREEN relabel, 2026-05-07)
# Same hyperparameters as original lora_triage.yaml; only output_dir differs
# so the original triage-seed{42,137,256} adapters are preserved untouched.
# Plain SFT — NO class-weighted CE per user direction (relabel rebalanced
# the YELLOW prior naturally; only switch to weighted CE if the gate fails).
specialist: triage
base_model: "unsloth/gemma-4-E4B-it"
max_seq_length: 4096
lora_rank: 32
lora_alpha: 64
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
batch_size: 4
gradient_accumulation: 4
epochs: 3
learning_rate: 2.0e-4
warmup_steps: 50
use_wandb: false
output_dir: outputs/triage-relabel-seed42
