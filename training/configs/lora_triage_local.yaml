# Local smoke-test LoRA config.
# Uses a fixture-derived local split generated by run_local_lora_smoke.py.

specialist: triage
base_model: "unsloth/gemma-4-E4B-it"
data_dir: "data/local_formatted"
output_dir: "outputs/triage-local"
max_seq_length: 4096
lora_rank: 32
lora_alpha: 64
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
batch_size: 1
gradient_accumulation: 1
epochs: 1
max_steps: 1
learning_rate: 2.0e-4
warmup_steps: 0
logging_steps: 1
eval_strategy: "steps"
eval_steps: 1
save_strategy: "steps"
save_steps: 1
load_best_model_at_end: false
dataset_num_proc: 1
use_wandb: false
