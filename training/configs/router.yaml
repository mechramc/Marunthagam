# KALAVAI MoE Router Configuration
# Single linear layer (embedding_dim → 3) + softmax
# Based on KALAVAI paper (arXiv:2603.22755)

# Data directory containing formatted specialist val.jsonl files
data_dir: "data/formatted"

# Embedder backend: "e4b" = mean-pooled Gemma 4 E4B last hidden state (real),
# "stub" = deterministic random vectors (pipeline test only).
embedder: "e4b"

# Embedding dimension — must match the hidden size of the chosen embedder.
# Gemma 4 E4B: text_config.hidden_size = 2560
embedding_dim: 2560

# Training hyperparameters
learning_rate: 1.0e-3
epochs: 50

# Output
output_dir: "outputs/router"

# Routing strategy: "top1" (default) or "top2_weighted" (for ambiguous inputs)
routing_strategy: "top1"
