# Triage LoRA at rank 16 — for A7 ablation anchor (real datapoint vs rank 32).
specialist: triage
base_model: "unsloth/gemma-4-E4B-it"
max_seq_length: 4096
lora_rank: 16
lora_alpha: 32
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
